name: PR Label Copy from Linked Issues

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  issues: read
  pull-requests: write

jobs:
  copy-issue-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Copy labels from linked issues to PR
        uses: actions/github-script@v6
        with:
          script: |
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const prBody = pr.body || '';
            const prTitle = pr.title || '';
            
            // Patterns to detect issue references
            const issuePatterns = [
              // Keywords with issue numbers: "Fixes #123", "Closes #456", etc.
              /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi,
              // Keywords with full GitHub URLs
              /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+https?:\/\/github\.com\/[^\/]+\/[^\/]+\/issues\/(\d+)/gi,
              // Issue keyword followed by number: "Issue #123", "issue: #456"
              /\bissue[:\s]+#(\d+)/gi,
              // Full GitHub issue URLs without keywords
              /https?:\/\/github\.com\/[^\/]+\/[^\/]+\/issues\/(\d+)/gi
            ];
            
            let linkedIssues = new Set();
            
            // Check PR body and title for issue references
            const textToCheck = `${prTitle} ${prBody}`;
            
            // Remove markdown code blocks to avoid false positives
            const textWithoutCodeBlocks = textToCheck.replace(/```[\s\S]*?```/g, '').replace(/`[^`]+`/g, '');
            
            // Remove markdown headings to avoid false positives
            const textWithoutHeadings = textWithoutCodeBlocks.replace(/^#+\s+\d+/gm, '');
            
            for (const pattern of issuePatterns) {
              const matches = textWithoutHeadings.matchAll(pattern);
              for (const match of matches) {
                const issueNum = match[1];
                if (issueNum) {
                  const matchContext = match.input.substring(Math.max(0, match.index - 10), match.index);
                  
                  // Skip if preceded by "PR" or "pull" (e.g., "PR #123")
                  if (/\b(?:pr|pull)\s*$/i.test(matchContext)) {
                    console.log(`Skipping #${issueNum} - appears to be a PR reference`);
                    continue;
                  }
                  
                  // Skip if it matches the current PR number
                  if (parseInt(issueNum) === prNumber) {
                    console.log(`Skipping #${issueNum} - matches current PR number`);
                    continue;
                  }
                  
                  linkedIssues.add(issueNum);
                }
              }
            }
            
            console.log(`Found ${linkedIssues.size} linked issue(s): ${Array.from(linkedIssues).join(', ')}`);
            
            if (linkedIssues.size === 0) {
              console.log('No linked issues found - nothing to do');
              return;
            }
            
            // Collect all labels from linked issues
            let labelsToAdd = new Set();
            
            for (const issueNum of linkedIssues) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: parseInt(issueNum)
                });
                
                for (const label of issue.labels) {
                  const labelName = typeof label === 'string' ? label : label.name;
                  if (labelName) {
                    labelsToAdd.add(labelName);
                  }
                }
                
                console.log(`Issue #${issueNum} has labels: ${issue.labels.map(l => l.name || l).join(', ') || 'none'}`);
              } catch (error) {
                console.log(`Could not fetch issue #${issueNum}: ${error.message}`);
              }
            }
            
            if (labelsToAdd.size === 0) {
              console.log('No labels found on linked issues - nothing to add');
              return;
            }
            
            // Get existing PR labels to avoid duplicates in logging
            const existingLabels = pr.labels.map(l => l.name);
            const newLabels = Array.from(labelsToAdd).filter(l => !existingLabels.includes(l));
            
            if (newLabels.length === 0) {
              console.log('All issue labels already exist on the PR - nothing to add');
              return;
            }
            
            // Add labels to the PR (additive - won't remove existing labels)
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: newLabels
            });
            
            console.log(`Added labels to PR #${prNumber}: ${newLabels.join(', ')}`);
